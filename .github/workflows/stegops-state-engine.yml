name: StegOps State Engine

on:
  issues:
    types: [opened, edited, labeled, reopened, closed]
  issue_comment:
    types: [created]
  repository_dispatch:
    types: [stegpay-payment-verified]
  workflow_dispatch: {}

concurrency:
  group: stegops-state-${{ github.event.issue.number || github.event.client_payload.event.issue || github.run_id }}
  cancel-in-progress: true

jobs:
  state-engine:
    if: |
      github.event_name == 'repository_dispatch' ||
      (
        github.event.issue != null &&
        contains(join(github.event.issue.labels.*.name, ','), 'stegops')
      )
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pyyaml

      # ---------------------------
      # Resolve issue context (FIXED)
      # ---------------------------
      - name: Compute issue vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            ISSUE="${{ github.event.client_payload.event.issue }}"
          else
            ISSUE="${{ github.event.issue.number }}"
          fi

          if [ -z "$ISSUE" ]; then
            echo "❌ ISSUE_NUMBER missing"
            exit 1
          fi

          echo "ISSUE_NUMBER=$ISSUE" >> $GITHUB_ENV
          echo "ISSUE_DIR=leads/issue-$ISSUE" >> $GITHUB_ENV

      # ---------------------------
      # BCAT
      # ---------------------------
      - name: Validate BCAT + compute status
        run: |
          python scripts/validate_bcat.py bcat.yaml
          STATUS=$(python scripts/bcat_status.py bcat.yaml)
          echo "BCAT_STATUS=$STATUS" >> $GITHUB_ENV

      - name: BCAT Summary
        run: |
          echo "## BCAT Runtime Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**BCAT_STATUS:** $BCAT_STATUS" >> $GITHUB_STEP_SUMMARY
          echo "**Event:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Issue:** $ISSUE_NUMBER" >> $GITHUB_STEP_SUMMARY

      - name: Refuse if BCAT denies
        if: env.BCAT_STATUS == 'DENIED'
        run: |
          echo "BCAT refusal: status=DENIED"
          exit 0

      - name: Set effect policy
        run: |
          if [ "$BCAT_STATUS" = "GRANTED" ]; then
            echo "DRY_RUN=false" >> $GITHUB_ENV
            echo "EXTERNAL_EFFECTS_ALLOWED=true" >> $GITHUB_ENV
          else
            echo "DRY_RUN=true" >> $GITHUB_ENV
            echo "EXTERNAL_EFFECTS_ALLOWED=false" >> $GITHUB_ENV
          fi

      # ---------------------------
      # Run engine
      # ---------------------------
      - name: Run state engine
        run: python scripts/state_engine.py

      # ---------------------------
      # Validation
      # ---------------------------
      - name: Validate state outputs
        run: python scripts/validate_state_outputs.py

      # ---------------------------
      # Report
      # ---------------------------
      - name: Report changes
        run: |
          echo "## State Engine Output" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -n "$(git status --porcelain)" ]; then
            echo "**Working tree changed:** yes" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            git status --porcelain >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Working tree changed:** no" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**DRY_RUN:** $DRY_RUN" >> $GITHUB_STEP_SUMMARY
          echo "**EXTERNAL_EFFECTS_ALLOWED:** $EXTERNAL_EFFECTS_ALLOWED" >> $GITHUB_STEP_SUMMARY

      # ---------------------------
      # Commit (scoped + safe)
      # ---------------------------
      - name: Commit state updates
        if: env.EXTERNAL_EFFECTS_ALLOWED == 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "steg-ops-orchestrator-bot"
            git config user.email "steg-ops-orchestrator-bot@users.noreply.github.com"

            git add "$ISSUE_DIR/state.json" "$ISSUE_DIR/STATUS.md" "$ISSUE_DIR/state.prev.json" 2>/dev/null || true

            if [ -n "$(git status --porcelain)" ]; then
              git commit -m "State: update engagement state (issue #$ISSUE_NUMBER)"
              git push
            else
              echo "Nothing staged after scoping"
            fi
          else
            echo "No changes to commit"
          fi

  # ---------------------------
  # Future separation of mutation
  # ---------------------------
  external-effects:
    needs: [state-engine]
    if: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - run: echo "Future: isolate mutations for least-privilege"
