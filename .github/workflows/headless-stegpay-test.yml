name: Headless StegPay Test

on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install pynacl

      # ---------------------------
      # Create test keys + envelope
      # ---------------------------
      - name: Generate signed test event
        run: |
          mkdir -p test_payload

          python << 'EOF'
import json, base64, uuid
from nacl.signing import SigningKey

# Generate test key
sk = SigningKey.generate()
pk = sk.verify_key

private_b64 = base64.b64encode(sk.encode()).decode()
public_b64 = base64.b64encode(pk.encode()).decode()

# Save trusted key
trusted = {
  "steg-root-test-v1": {
    "issuer": "stegpay-test-001",
    "public_key": public_b64,
    "status": "active"
  }
}

with open("trusted_keys.json", "w") as f:
    json.dump(trusted, f, indent=2)

# Build event
event = {
  "event_id": str(uuid.uuid4()),
  "event_type": "payment_verified",
  "issue": 1,
  "provider": "stripe",
  "provider_id": "pi_test_123",
  "amount": 2500,
  "currency": "usd",
  "verified_utc": "2026-03-22T21:10:00Z",
  "service": "audit"
}

canonical = json.dumps(event, sort_keys=True, separators=(",", ":")).encode()
sig = sk.sign(canonical).signature
sig_b64 = base64.b64encode(sig).decode()

envelope = {
  "schema_version": 1,
  "envelope_type": "stegverse_event",
  "event": event,
  "issuer": {
    "id": "stegpay-test-001",
    "key_id": "steg-root-test-v1"
  },
  "signature": {
    "algorithm": "ed25519",
    "value": sig_b64
  }
}

with open("test_payload/envelope.json", "w") as f:
    json.dump(envelope, f, indent=2)
EOF

      # ---------------------------
      # Create fake GitHub event
      # ---------------------------
      - name: Create repository_dispatch payload
        run: |
          cat > test_payload/event.json << 'EOF'
{
  "action": "stegpay-payment-verified",
  "client_payload": {}
}
EOF

          python << 'EOF'
import json

env = json.load(open("test_payload/envelope.json"))
evt = json.load(open("test_payload/event.json"))

evt["client_payload"] = env

with open("test_payload/final_event.json", "w") as f:
    json.dump(evt, f)
EOF

      # ---------------------------
      # Run state engine
      # ---------------------------
      - name: Run state engine (headless)
        run: |
          export GITHUB_EVENT_NAME=repository_dispatch
          export GITHUB_EVENT_PATH=test_payload/final_event.json

          python scripts/state_engine.py

      # ---------------------------
      # Show outputs
      # ---------------------------
      - name: Print outputs
        run: |
          echo "==== FILE TREE ===="
          find leads || true

          echo "==== STATE ===="
          cat leads/issue-1/state.json || true

          echo "==== STATUS ===="
          cat leads/issue-1/STATUS.md || true

          echo "==== LEDGER ===="
          cat leads/issue-1/ledger.jsonl || true

      # ---------------------------
      # Upload artifact (iPhone-friendly)
      # ---------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stegops-headless-output
          path: leads/
